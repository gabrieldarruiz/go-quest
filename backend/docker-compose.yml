services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: goquest
      POSTGRES_PASSWORD: goquest
      POSTGRES_DB: goquest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goquest"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8081"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
